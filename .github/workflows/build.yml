name: Build Android APK with llama.cpp

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Clone llama.cpp
      run: |
        git clone --depth 1 https://github.com/ggml-org/llama.cpp.git llama.cpp

    - name: Build llama.cpp for Android
      run: |
        mkdir -p llama-build
        cd llama-build
        cmake ../llama.cpp \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-24 \
          -DANDROID_STL=c++_shared \
          -DLLAMA_BUILD_TESTS=OFF \
          -DLLAMA_BUILD_EXAMPLES=OFF \
          -DLLAMA_BUILD_SERVER=OFF \
          -DCMAKE_BUILD_TYPE=Release
        cmake --build . --config Release -j$(nproc)

    - name: Copy native libraries
      run: |
        mkdir -p app/src/main/jniLibs/arm64-v8a
        cp llama-build/bin/libggml-base.so app/src/main/jniLibs/arm64-v8a/
        cp llama-build/bin/libggml-cpu.so app/src/main/jniLibs/arm64-v8a/
        cp llama-build/bin/libggml.so app/src/main/jniLibs/arm64-v8a/
        cp llama-build/bin/libllama.so app/src/main/jniLibs/arm64-v8a/
        cp $ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so app/src/main/jniLibs/arm64-v8a/

    - name: Copy llama.cpp headers
      run: |
        cp -r llama.cpp app/src/main/cpp/llama-src

    - name: Build APK
      run: ./gradlew assembleRelease

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: local-ai-server-v3-apk
        path: app/build/outputs/apk/release/app-release.apk

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v3.0-${{ github.run_number }}
        name: Local AI Server v3.0
        files: app/build/outputs/apk/release/app-release.apk
        body: |
          ## Local AI Server v3.0
          
          ### 新特性
          - ✅ 完整MVVM架构
          - ✅ Hilt依赖注入
          - ✅ 前台服务（后台稳定运行）
          - ✅ Kotlin协程异步处理
          - ✅ 内存优化
          - ✅ Repository模式
          
          ### 支持模型
          - Qwen3-1.7B-Q4_K_M
          - Qwen2.5-3B-Q4_K_M
          - Gemma-2B-Q4_K_M
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
