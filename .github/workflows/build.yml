name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build APK
      run: ./gradlew assembleDebug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: local-ai-server-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v3.1.3
        name: Local AI Server v3.1.3 - 添加文件选择功能
        draft: false
        prerelease: false
        files: app/build/outputs/apk/debug/app-debug.apk
        body: |
          ## Local AI Server v3.1.3
          
          ### 新增功能
          - 添加"选择GGUF文件"按钮，支持从存储选择模型文件
          - 使用Android Storage Access Framework选择文件
          
          ### 修复内容
          - 修复启动服务按钮灰色无法点击的问题
          - 启动服务不再依赖模型加载状态
          
          ### 安装说明
          1. 下载APK文件
          2. 在手机上安装（可能需要允许"安装未知来源应用"）
          3. 打开应用，授予存储权限
          4. 选择一个GGUF模型文件进行测试
          
          ### 设备要求
          - Android 7.0 (API 24) 及以上
          - 任意CPU架构
          - 推荐内存：4GB以上
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
