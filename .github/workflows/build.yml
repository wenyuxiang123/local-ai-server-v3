name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Download Qwen3-1.7B model
      run: |
        mkdir -p app/src/main/assets
        echo "Downloading Qwen3-1.7B model..."
        curl -L --retry 3 --retry-delay 5 -o app/src/main/assets/qwen3-1.7b-q4_k_m.gguf "https://huggingface.co/Qwen/Qwen3-1.7B-GGUF/resolve/main/qwen3-1.7b-q4_k_m.gguf"
        ls -lh app/src/main/assets/

    - name: Build APK
      run: ./gradlew assembleDebug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: local-ai-server-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v3.2.1
        name: Local AI Server v3.2.1 - 内置Qwen3-1.7B模型
        draft: false
        prerelease: false
        files: app/build/outputs/apk/debug/app-debug.apk
        body: |
          ## Local AI Server v3.2.1
          
          ### 重大更新
          - 内置Qwen3-1.7B-Q4_K_M模型（约1.1GB）
          - 首次启动自动解压模型到应用目录
          - 无需额外下载，开箱即用
          
          ### 功能
          - 启动/停止本地AI服务
          - 支持本地模型推理
          - HTTP API接口供外部调用
          
          ### 安装说明
          1. 下载APK文件（约1.2GB）
          2. 在手机上安装
          3. 打开应用，等待模型解压完成
          4. 启动服务即可使用
          
          ### 设备要求
          - Android 7.0 (API 24) 及以上
          - 推荐4GB以上内存
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
