name: Build Android APK with llama.cpp

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Clone llama.cpp
      run: |
        git clone --depth 1 https://github.com/ggml-org/llama.cpp.git llama.cpp

    - name: Build llama.cpp for Android
      run: |
        mkdir -p llama-build
        cd llama-build
        cmake ../llama.cpp \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-28 \
          -DANDROID_STL=c++_shared \
          -DCMAKE_C_FLAGS="-march=armv8.7a" \
          -DCMAKE_CXX_FLAGS="-march=armv8.7a" \
          -DGGML_OPENMP=OFF \
          -DGGML_LLAMAFILE=OFF \
          -DLLAMA_BUILD_TESTS=OFF \
          -DLLAMA_BUILD_EXAMPLES=OFF \
          -DLLAMA_CURL=OFF \
          -DCMAKE_BUILD_TYPE=Release
        cmake --build . --config Release -j$(nproc)
        
        # List built libraries
        echo "Built libraries:"
        find . -name "*.so" -type f 2>/dev/null || ls -la bin/ 2>/dev/null || ls -la . 2>/dev/null

    - name: Copy native libraries
      run: |
        mkdir -p app/src/main/jniLibs/arm64-v8a
        
        # Find and copy all .so files from llama-build
        echo "Looking for libraries in llama-build..."
        find llama-build -name "*.so" -type f -exec ls -la {} \;
        
        # Try different possible locations
        for lib in libggml-base.so libggml-cpu.so libggml.so libllama.so libggml-base.dylib libggml-cpu.dylib libggml.dylib libllama.dylib; do
          found=$(find llama-build -name "$lib" -type f 2>/dev/null | head -1)
          if [ -n "$found" ]; then
            cp "$found" app/src/main/jniLibs/arm64-v8a/
            echo "Copied: $found"
          fi
        done
        
        # Check if we got the libraries
        ls -la app/src/main/jniLibs/arm64-v8a/

    - name: Copy llama.cpp headers
      run: |
        mkdir -p app/src/main/cpp/llama-src/include
        cp -r llama.cpp/ggml/include/* app/src/main/cpp/llama-src/include/
        cp -r llama.cpp/include/* app/src/main/cpp/llama-src/include/

    - name: Build APK
      run: ./gradlew assembleDebug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: local-ai-server-v3-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v3.0.2
        name: Local AI Server v3.0.2 - 修复启动崩溃
        draft: false
        prerelease: false
        files: app/build/outputs/apk/debug/app-debug.apk
        body: |
          ## Local AI Server v3.0.2
          
          ### 修复内容
          - 修复native库加载导致的启动崩溃问题
          - 延迟加载native库，避免静态初始化失败
          - 添加详细的错误日志输出
          - 更新llama.cpp CMake构建配置
          
          ### 安装说明
          1. 下载APK文件
          2. 在手机上安装（可能需要允许"安装未知来源应用"）
          3. 如仍有问题请提供logcat日志
          
          ### 设备要求
          - Android 9.0 (API 28) 及以上
          - ARM64架构
          - 推荐内存：4GB以上
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
